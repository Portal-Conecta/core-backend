services:
  postgres:
    image: postgres:16-alpine
    container_name: portal-conecta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portal_conecta}
      POSTGRES_USER: ${POSTGRES_USER:-portal_conecta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portal_conecta_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: portal-conecta-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MAVEN_USERNAME: ${MAVEN_USERNAME:-}
      secrets:
        - maven_password
    container_name: portal-conecta-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: -javaagent:/app/opentelemetry-javaagent.jar
      OTEL_SERVICE_NAME: hub
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://alloy:4318/v1/traces
      OTEL_TRACES_SAMPLER: parentbased_always_on
      OTEL_INSTRUMENTATION_COMMON_DB_STATEMENT_SANITIZER_ENABLED: "true"
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-portal_conecta}
      DB_USERNAME: ${POSTGRES_USER:-portal_conecta}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-portal_conecta_dev_password}
      DB_DRIVER: org.postgresql.Driver
      FLYWAY_BASELINE_ON_MIGRATE: ${FLYWAY_BASELINE_ON_MIGRATE:-true}
      JWT_SECRET: ${JWT_SECRET:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-900000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      RABBITMQ_ENABLED: ${RABBITMQ_ENABLED:-true}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_NOTIFICATIONS_EXCHANGE: ${RABBITMQ_NOTIFICATIONS_EXCHANGE:-notifications.exchange}
      RABBITMQ_NOTIFICATIONS_QUEUE: ${RABBITMQ_NOTIFICATIONS_QUEUE:-notifications.dispatch.q}
      RABBITMQ_NOTIFICATIONS_DLQ: ${RABBITMQ_NOTIFICATIONS_DLQ:-notifications.dispatch.dlq}
      RABBITMQ_NOTIFICATIONS_ROUTING_KEY: ${RABBITMQ_NOTIFICATIONS_ROUTING_KEY:-notification.requested}
      RABBITMQ_RETRY_ENABLED: ${RABBITMQ_RETRY_ENABLED:-true}
      RABBITMQ_RETRY_MAX_ATTEMPTS: ${RABBITMQ_RETRY_MAX_ATTEMPTS:-3}
      RABBITMQ_RETRY_INITIAL_INTERVAL: ${RABBITMQ_RETRY_INITIAL_INTERVAL:-1000}
      RABBITMQ_RETRY_MULTIPLIER: ${RABBITMQ_RETRY_MULTIPLIER:-2}
      RABBITMQ_RETRY_MAX_INTERVAL: ${RABBITMQ_RETRY_MAX_INTERVAL:-10000}
      RABBITMQ_DEFAULT_REQUEUE_REJECTED: ${RABBITMQ_DEFAULT_REQUEUE_REJECTED:-false}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:-true}
      ACCOUNT_ACTIVATION_BASE_URL: ${ACCOUNT_ACTIVATION_BASE_URL:-http://localhost:3002/ativar-conta}
      ACCOUNT_ACTIVATION_MAIL_FROM: ${ACCOUNT_ACTIVATION_MAIL_FROM:-no-reply@portal-conecta.local}
      PORTAL_ENVIRONMENT: ${PORTAL_ENVIRONMENT:-local}
    labels:
      portal.service: hub
      portal.environment: ${PORTAL_ENVIRONMENT:-local}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  postgres-data:

secrets:
  maven_password:
    environment: MAVEN_PASSWORD
